name: Conformance Tests (Nightly)

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  conformance-full:
    name: Full Phase 1 Conformance Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - name: Run all conformance tests
        run: ./gradlew :distribution:conformance:conformanceTest
      - name: Upload conformance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-report-nightly-${{ github.run_number }}
          path: distribution/conformance/build/reports/conformance/
          retention-days: 90
      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              labels: 'conformance-failure', state: 'open'
            });
            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: `Conformance suite failed on nightly run ${context.runNumber}`,
                body: `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                labels: ['conformance-failure', 'bug']
              });
            }
