name: Documentation Check

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'
      - '*.md'
      - '.github/workflows/docs-check.yml'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'
      - '*.md'
      - '.github/workflows/docs-check.yml'

jobs:
  check-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Kotlin
        uses: fwilhe2/setup-kotlin@v1
        with:
          kotlin-version: '2.2.21'

      - name: Check version consistency
        run: |
          echo "Checking version consistency..."
          KOTLIN_VERSION=$(grep '^kotlin = ' gradle/libs.versions.toml | cut -d'"' -f2)
          echo "Kotlin version in libs.versions.toml: $KOTLIN_VERSION"
          
          # Check README.md
          if grep -q "Kotlin.*2\.[0-9]" README.md; then
            echo "✅ README.md mentions Kotlin version"
          else
            echo "⚠️  README.md should mention Kotlin version"
          fi
          
          # Check docs for version references
          if grep -r "Kotlin.*2\.[0-9]" docs/ --include="*.md" | head -1; then
            echo "✅ Documentation mentions Kotlin version"
          else
            echo "⚠️  Documentation should mention Kotlin version"
          fi

      - name: Check module names
        run: |
          echo "Checking module name consistency..."
          # Check for old module names
          if grep -r "TrustWeave-core\|trustweave-core" README.md docs/ --include="*.md" 2>/dev/null; then
            echo "❌ Found old module names (TrustWeave-core). Should use 'distribution-all'"
            exit 1
          else
            echo "✅ No old module names found"
          fi

      - name: Check for broken code blocks
        run: |
          echo "Checking for broken code blocks..."
          # Check for unclosed code blocks
          if grep -r "```" docs/ README.md --include="*.md" | awk '{print NR": "$0}' | grep -c "```" | awk '{if ($1 % 2 != 0) exit 1}'; then
            echo "✅ All code blocks are properly closed"
          else
            echo "⚠️  Some code blocks may not be properly closed"
          fi

      - name: Validate markdown syntax
        run: |
          echo "Validating markdown syntax..."
          # Install markdownlint if available, or use basic checks
          if command -v markdownlint &> /dev/null; then
            markdownlint docs/ README.md
          else
            echo "⚠️  markdownlint not available, skipping advanced validation"
            echo "✅ Basic markdown validation complete"
          fi

      - name: Forbid blanket "all TrustWeave methods throw" in docs
        run: |
          set -euo pipefail
          echo "Checking docs for obsolete API contract wording..."
          if grep -rE "All \`TrustWeave\` methods throw|All TrustWeave methods throw" docs/ --include="*.md" 2>/dev/null; then
            echo "❌ Found blanket claim that all TrustWeave methods throw. Use the hybrid contract in docs/getting-started/api-patterns.md"
            exit 1
          fi
          echo "✅ No forbidden blanket throw wording in docs/"

      - name: Forbid obsolete wallet.presentation in docs
        run: |
          set -euo pipefail
          echo "Checking docs for non-existent wallet.presentation API..."
          if grep -r --exclude-dir=_site -E 'wallet\.presentation\s*\{' docs/ --include="*.md" 2>/dev/null; then
            echo "❌ Found wallet.presentation { } — use trustWeave.presentationFromWalletResult(wallet) { }. See docs/how-to/create-presentations.md"
            exit 1
          fi
          echo "✅ No wallet.presentation in docs/ (excluding _site)"

      - name: Check API examples
        run: |
          set -euo pipefail
          echo "Checking for removed TrustWeave service-layer API (dids / credentials / wallets)..."
          # Phase 4 removed: trustweave.dids.*, .credentials.*, .wallets.* (and TrustWeave.dids.* misuse).
          # Do not grep issueCredential / verifyCredential / .create() globally — those match exchange
          # registries, KMS factories, Testcontainers, diagrams, and teaching examples.
          # Allowed: docs/migration/ (before/after), docs/getting-started/api-patterns.md (wrong vs right).
          if grep -r -E \
              --include='*.md' \
              --exclude-dir=migration \
              --exclude='api-patterns.md' \
              -e 'trustweave\.dids\.' \
              -e 'TrustWeave\.dids\.' \
              -e 'trustweave\.credentials\.' \
              -e 'TrustWeave\.credentials\.' \
              -e 'trustweave\.wallets\.' \
              -e 'TrustWeave\.wallets\.' \
              docs/ README.md \
              2>/dev/null; then
            echo "❌ Found removed service-layer API. Use createDid / resolveDid / issue { } / verify / wallet { }."
            echo "   Legacy snippets belong in docs/migration/ or anti-patterns in docs/getting-started/api-patterns.md"
            exit 1
          fi
          echo "✅ No removed TrustWeave service-layer API outside migration / api-patterns.md"

